const ASOF = "2026-07-13";
const CATS = ["All","Music","Movies & TV","Comedy","Sports","Other"];
const catOf = e => e.industry === "Music" ? "Music" : (e.industry === "Film" || e.industry === "TV") ? "Movies & TV"
  : e.industry === "Comedy" ? "Comedy" : e.industry === "Sports" ? "Sports" : "Other";
const FAMOUS = { "Music":"Musician", "Film":"Actor / filmmaker", "TV":"TV figure", "Comedy":"Comedian", "Sports":"Athlete", "Other":"Public figure" };
const TIERS = {
  1:{c:"var(--t1)", label:"Convicted or pled guilty"},
  2:{c:"var(--t2)", label:"Settled or charged"},
  3:{c:"var(--t3)", label:"Accused only"},
  4:{c:"var(--t4)", label:"Thin / single source"}
};
const state = { cat:"All", q:"", tiers:new Set([1,2,3,4]) };
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const key = s => String(s??"").normalize("NFKD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,60);

const tabs = document.getElementById("tabs");
CATS.forEach(c => {
  const b = document.createElement("button");
  const n = c === "All" ? DATA.length : DATA.filter(e => catOf(e) === c).length;
  b.textContent = c + " (" + n + ")";
  if (c === "All") b.classList.add("on");
  b.onclick = () => { state.cat = c; document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("on")); b.classList.add("on"); render(); };
  tabs.appendChild(b);
});
const chips = document.getElementById("chips");
[1,2,3,4].forEach(t => {
  const b = document.createElement("button");
  b.className = "chip on";
  b.innerHTML = '<span class="cd" style="background:' + TIERS[t].c + '"></span>' + TIERS[t].label;
  b.onclick = () => { state.tiers.has(t) ? state.tiers.delete(t) : state.tiers.add(t); b.classList.toggle("on"); render(); };
  chips.appendChild(b);
});
document.getElementById("q").addEventListener("input", e => { state.q = key(e.target.value); render(); });

function matches(e) {
  if (state.cat !== "All" && catOf(e) !== state.cat) return false;
  if (!state.tiers.has(e.tier)) return false;
  if (state.q) {
    const hay = [e.name, ...(e.aka||[])].map(key).join(" ");
    if (!hay.includes(state.q)) return false;
  }
  return true;
}
const safeUrl = u => { try { const x = new URL(u); return (x.protocol === "https:" || x.protocol === "http:") ? x.href : null; } catch(err) { return null; } };
function card(e) {
  const t = TIERS[e.tier];
  const srcs = (e.sources||[]).filter(s => safeUrl(s.u)).map(s => '<a href="' + esc(safeUrl(s.u)) + '" target="_blank" rel="noopener noreferrer">' + esc(s.t) + '</a>').join(" · ");
  const aka = (e.aka&&e.aka.length) ? '<span class="aka">' + esc(e.aka[0]) + '</span>' : "";
  return '<div class="card"><h2>' + esc(e.name) + aka + '</h2>'
    + '<div class="meta"><span class="badge"><span class="dot" style="background:' + t.c + '"></span>' + t.label + '</span>'
    + '<span class="cat">' + esc(FAMOUS[e.industry]||"Public figure") + ' · ' + e.year + '</span>'
    + (e.pending ? '<span class="live">case still active</span>' : "") + '</div>'
    + '<p class="detail">' + esc(e.detail) + '</p>'
    + '<div class="srcs">Sources: ' + srcs + '</div>'
    + '<div class="checked">Last checked ' + esc(e.lastCheckedAt) + '</div></div>';
}
function render() {
  const arr = DATA.filter(matches).sort((a,b) => a.name.localeCompare(b.name));
  document.getElementById("list").innerHTML = arr.length ? arr.map(card).join("") : '<div class="empty">No matches.</div>';
  document.getElementById("count").textContent = arr.length + " of " + DATA.length + " people shown";
}
document.getElementById("foot").innerHTML =
  '<b>How to read this:</b> "Convicted or pled guilty" means a criminal court outcome. "Settled or charged" means a civil settlement/judgment or criminal charges that may have ended any way — including dismissal or acquittal (the card says which). "Accused only" means reported allegations with no legal outcome. Labels describe the documentation, not the severity of conduct.<br><br>'
  + 'This is a reference of publicly documented information with sources for each claim. It asserts nothing beyond what the documents say — several people here were acquitted, had cases dismissed, or were never charged, and denials are always noted. Verify independently and decide for yourself. Updated ' + ASOF + '.';
render();
</script>
